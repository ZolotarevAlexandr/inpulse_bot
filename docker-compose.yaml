services:
  bot:
    image: "ghcr.io/zolotarevalexandr/inpulse_bot:${DOCKER_TAG_BOT:-latest}"
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      alembic-migrate:
        condition: service_completed_successfully
    volumes:
      - "./settings.yaml:/app/settings.yaml:ro"
    environment:
      TZ: Europe/Moscow
      DB_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-inpulse}
    healthcheck:
      test: ["CMD-SHELL", "python3 -c 'import urllib.request; urllib.request.urlopen(\"http://127.0.0.1:8080/health\", timeout=2)'"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 1g

  db:
    image: "postgres:17.1"
    restart: unless-stopped
    ports:
      - "5432:5432"
    volumes:
      - "postgres:/var/lib/postgresql/data"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-postgres} -d $${POSTGRES_DB:-inpulse} && PGPASSWORD=$${POSTGRES_PASSWORD:-postgres} psql -U $${POSTGRES_USER:-postgres} -d $${POSTGRES_DB:-inpulse} -c 'SELECT 1;'"]
      timeout: 5s
      start_period: 30s
      interval: 1m
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-inpulse}

  alembic-migrate:
    image: "ghcr.io/zolotarevalexandr/inpulse_bot:${DOCKER_TAG_BOT:-latest}"
    restart: no
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - "./settings.yaml:/app/settings.yaml:ro" # Read-only settings file
    environment:
      TZ: "Europe/Moscow"
      DB_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-inpulse}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: alembic upgrade head

  redis:
    image: "redis:7.2.4-alpine"
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - "redis:/data"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

volumes:
  postgres:
  redis:
